<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicación del Cálculo Diferencial</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Aplicación del Cálculo Diferencial</h1>
            <p class="subtitle">Optimización de Costos Empresariales</p>
        </header>

        <div class="input-section">
            <h2>Función de Costo Total</h2>
            <p class="formula">C(x) = ax² + bx + c</p>
            
            <div class="inputs">
                <div class="input-group">
                    <label for="a">Coeficiente a: costo cuadratico</label>
                    <input type="number" id="a" value="2" step="0.01">
                </div>
                <div class="input-group">
                    <label for="b">Coeficiente b: costo lineal</label>
                    <input type="number" id="b" value="-120" step="0.01">
                </div>
                <div class="input-group">
                    <label for="c">Coeficiente c: costo fijo</label>
                    <input type="number" id="c" value="2000" step="0.01">
                </div>
            </div>

            <button onclick="calcularOptimizacion()" class="btn-calcular">
                <span>Calcular Optimización</span>
            </button>
        </div>

        <div id="resultados" class="resultados hidden">
            <h2>Resultados de Optimización</h2>
            
            <div class="cards">
                <div class="card">
                    <div class="icon">📍</div>
                    <h3>Punto Óptimo</h3>
                    <p id="punto-optimo">x = </p>
                </div>
                <div class="card">
                    <div class="icon">💰</div>
                    <h3>Costo Mínimo</h3>
                    <p id="costo-minimo">C(x) = </p>
                </div>
                <div class="card">
                    <div class="icon">📉</div>
                    <h3>Derivada</h3>
                    <p id="derivada">C'(x) = </p>
                </div>
            </div>

            <div class="interpretacion">
                <h3>Interpretación Empresarial</h3>
                <p id="interpretacion"></p>
            </div>

            <div class="grafica-container">
                <canvas id="grafica"></canvas>
            </div>

    <script src="script.js"></script>
</body>
</html>
